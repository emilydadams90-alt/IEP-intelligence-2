<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IEP Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1b35;font-family:Georgia,serif;color:#f8f4ec;padding:16px}
h1{color:#f0a820;font-size:20px;margin-bottom:16px}
p{font-size:13px;color:#94a3b8;margin-bottom:16px}
input,select,textarea{width:100%;background:#162950;border:1px solid #2a4e9a;border-radius:5px;padding:10px;color:#f8f4ec;font-size:16px;font-family:Georgia,serif;display:block;margin-bottom:10px;-webkit-appearance:none;outline:none}
.lbl{display:block;font-size:12px;color:#f0a820;margin-bottom:4px;margin-top:8px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
button.chip{padding:8px 12px;border-radius:5px;font-size:13px;border:2px solid #2a4e9a;background:#162950;color:#94a3b8;font-family:Georgia,serif;-webkit-appearance:none;cursor:pointer}
button.chip.on{background:#d4880a;color:#0d1b35;border-color:#d4880a;font-weight:bold}
button.main{width:100%;padding:14px;font-size:16px;font-weight:bold;border-radius:7px;font-family:Georgia,serif;-webkit-appearance:none;cursor:pointer;margin-top:8px;border:none}
button.amber{background:linear-gradient(135deg,#d4880a,#f0a820);color:#0d1b35}
button.green{background:linear-gradient(135deg,#1e6e43,#2d9e62);color:#fff}
.status{background:#162950;border:1px solid #2a4e9a;border-radius:5px;padding:12px;font-size:13px;margin-top:10px;display:none}
.grp{margin-bottom:10px}
.grp-btn{width:100%;text-align:left;padding:8px 10px;background:#162950;border:1px solid #2a4e9a;border-radius:4px;color:#f0a820;font-size:11px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;-webkit-appearance:none;cursor:pointer;margin-bottom:5px;display:flex;justify-content:space-between}
</style>
</head>
<body>

<h1>IEP Intelligence</h1>
<p>PLAAFP + Impact Statement Generator</p>

<!-- STATUS BOX - shows what's happening -->
<div class="status" id="status">Ready</div>

<div class="lbl">First Name</div>
<input type="text" id="fn" placeholder="e.g. Jordan"/>

<div class="lbl">Last Name</div>
<input type="text" id="ln" placeholder="e.g. Smith"/>

<div class="lbl">Grade</div>
<select id="grade">
  <option value="">Select grade</option>
  <option>1st Grade</option><option>2nd Grade</option><option>3rd Grade</option>
  <option>4th Grade</option><option>5th Grade</option><option>6th Grade</option>
  <option>7th Grade</option><option>8th Grade</option><option>9th Grade</option>
  <option>10th Grade</option><option>11th Grade</option><option>12th Grade</option>
</select>

<div class="lbl">Disability (tap all that apply)</div>
<div class="chip-wrap" id="dis-wrap">
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Autism Spectrum Disorder</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Intellectual Disability</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Specific Learning Disability</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Speech or Language Impairment</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Emotional Disturbance</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Other Health Impairment</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Developmental Delay</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Traumatic Brain Injury</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Visual Impairment (including Blindness)</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Hearing Impairment</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Deaf-Blindness</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Multiple Disabilities</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Orthopedic Impairment</button>
  <button class="chip" onclick="this.classList.toggle('on');showSel()">Deafness</button>
</div>

<div class="lbl">Areas of Need (tap all that apply)</div>
<div id="area-count" style="font-size:11px;color:#94a3b8;font-family:monospace;margin-bottom:8px">0 selected</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('academic',this)">
    <span>Academic Areas</span><span id="ac-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="academic">
    <button class="chip" onclick="togArea(this)">Reading / Decoding and Fluency</button>
    <button class="chip" onclick="togArea(this)">Reading Comprehension</button>
    <button class="chip" onclick="togArea(this)">Mathematics - Computation</button>
    <button class="chip" onclick="togArea(this)">Mathematics - Problem Solving</button>
    <button class="chip" onclick="togArea(this)">Written Expression</button>
    <button class="chip" onclick="togArea(this)">Oral Language / Listening Comprehension</button>
    <button class="chip" onclick="togArea(this)">Science / Content Knowledge</button>
    <button class="chip" onclick="togArea(this)">Social Studies / Content Knowledge</button>
  </div>
</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('functional',this)">
    <span>Functional and Adaptive Areas</span><span id="fn-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="functional">
    <button class="chip" onclick="togArea(this)">Daily Living / Self-Care Skills</button>
    <button class="chip" onclick="togArea(this)">Community and Domestic Skills</button>
    <button class="chip" onclick="togArea(this)">Functional Communication</button>
    <button class="chip" onclick="togArea(this)">Vocational / Pre-Employment Skills</button>
    <button class="chip" onclick="togArea(this)">Self-Determination and Self-Advocacy</button>
    <button class="chip" onclick="togArea(this)">Recreation and Leisure</button>
    <button class="chip" onclick="togArea(this)">Health and Wellness</button>
  </div>
</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('social',this)">
    <span>Social, Emotional and Behavioral</span><span id="se-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="social">
    <button class="chip" onclick="togArea(this)">Social Skills and Peer Interactions</button>
    <button class="chip" onclick="togArea(this)">Emotional Regulation</button>
    <button class="chip" onclick="togArea(this)">Behavior / Executive Functioning</button>
    <button class="chip" onclick="togArea(this)">Attention and Impulse Control</button>
    <button class="chip" onclick="togArea(this)">Mental Health and Coping Skills</button>
  </div>
</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('comm',this)">
    <span>Communication and Motor</span><span id="cm-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="comm">
    <button class="chip" onclick="togArea(this)">Expressive Communication / Speech</button>
    <button class="chip" onclick="togArea(this)">Receptive Language</button>
    <button class="chip" onclick="togArea(this)">Augmentative and Alternative Communication (AAC)</button>
    <button class="chip" onclick="togArea(this)">Fine Motor Skills</button>
    <button class="chip" onclick="togArea(this)">Gross Motor Skills</button>
    <button class="chip" onclick="togArea(this)">Sensory Processing</button>
  </div>
</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('transition',this)">
    <span>Transition (NTACT / IDEA 300.43)</span><span id="tr-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="transition">
    <button class="chip" onclick="togArea(this)">Postsecondary Education and Training</button>
    <button class="chip" onclick="togArea(this)">Employment and Career Readiness</button>
    <button class="chip" onclick="togArea(this)">Independent Living Skills</button>
    <button class="chip" onclick="togArea(this)">Transportation and Mobility (Transition)</button>
    <button class="chip" onclick="togArea(this)">Financial Literacy</button>
  </div>
</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('ecc-vi',this)">
    <span>ECC - Visual Impairment (IDEA / TSBVI)</span><span id="vi-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="ecc-vi">
    <button class="chip" onclick="togArea(this)">ECC: Compensatory / Functional Academic Skills</button>
    <button class="chip" onclick="togArea(this)">ECC: Sensory Efficiency Skills</button>
    <button class="chip" onclick="togArea(this)">ECC: Orientation and Mobility (O and M)</button>
    <button class="chip" onclick="togArea(this)">ECC: Social Interaction Skills (VI)</button>
    <button class="chip" onclick="togArea(this)">ECC: Independent Living Skills (VI)</button>
    <button class="chip" onclick="togArea(this)">ECC: Recreation and Leisure (VI)</button>
    <button class="chip" onclick="togArea(this)">ECC: Career Education (VI)</button>
    <button class="chip" onclick="togArea(this)">ECC: Assistive Technology (VI)</button>
    <button class="chip" onclick="togArea(this)">ECC: Self-Determination (VI)</button>
  </div>
</div>

<div class="grp">
  <button class="grp-btn" onclick="toggleGrp('ecc-dhh',this)">
    <span>ECC - Deaf / Hard of Hearing</span><span id="dh-arr">&#9650;</span>
  </button>
  <div class="chip-wrap" id="ecc-dhh">
    <button class="chip" onclick="togArea(this)">DHH ECC: Audiology and Amplification Management</button>
    <button class="chip" onclick="togArea(this)">DHH ECC: Communication and Language Access</button>
    <button class="chip" onclick="togArea(this)">DHH ECC: Self-Advocacy and Disability Awareness</button>
    <button class="chip" onclick="togArea(this)">DHH ECC: Social-Emotional Skills (DHH)</button>
    <button class="chip" onclick="togArea(this)">DHH ECC: Functional Skills for Educational Success</button>
    <button class="chip" onclick="togArea(this)">DHH ECC: Career Education (DHH)</button>
    <button class="chip" onclick="togArea(this)">DHH ECC: Technology Access (DHH)</button>
  </div>
</div>

<div style="display:flex;gap:8px;margin-top:10px;margin-bottom:8px">
  <input type="text" id="custom-in" placeholder="Add custom area..." style="margin-bottom:0;flex:1"/>
  <button class="chip" style="flex-shrink:0;background:#d4880a;color:#0d1b35;border-color:#d4880a;font-weight:bold" onclick="addCustom()">+ Add</button>
</div>
<div class="chip-wrap" id="custom-chips"></div>

<div class="lbl">Additional Context (optional)</div>
<textarea id="ctx" rows="3" placeholder="e.g. recent eval, related services, parent concerns..."></textarea>

<div id="err-msg" style="color:#f87171;font-size:13px;margin:6px 0;display:none"></div>

<button class="main amber" onclick="startInterview()">Begin Compliance Interview</button>

<!-- PHASE 2: INTERVIEW -->
<div id="phase2" style="display:none;margin-top:16px">
  <div id="q-area"></div>
</div>

<!-- PHASE 3: OUTPUT -->
<div id="phase3" style="display:none;margin-top:16px">
  <div style="display:flex;gap:3px;margin-bottom:0" id="tab-row"></div>
  <div id="out-box" style="background:#162950;border:1px solid #2a4e9a;border-radius:0 0 6px 6px;padding:14px;max-height:600px;overflow-y:auto"></div>
</div>

<script>
'use strict';

var API_URL = 'https://iep-plaafp.onrender.com/api/messages';
var prof = null;
var hist = [];
var curQ = null;
var coll = {};
var numAns = 0;
var msOpts = [];
var scVal = '';
var result = null;
var curTab = 'plaafp';

function showStatus(msg) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function showErr(msg) {
  var el = document.getElementById('err-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function togArea(btn) {
  btn.classList.toggle('on');
  var n = document.querySelectorAll('#academic .chip.on, #functional .chip.on, #social .chip.on, #comm .chip.on, #transition .chip.on, #ecc-vi .chip.on, #ecc-dhh .chip.on, #custom-chips .chip.on').length;
  document.getElementById('area-count').textContent = n + ' selected';
}

function showSel() {
  var n = document.querySelectorAll('#dis-wrap .chip.on').length;
  showStatus(n + ' disabilities selected');
}

function toggleGrp(id, btn) {
  var el = document.getElementById(id);
  var hidden = el.style.display === 'none';
  el.style.display = hidden ? 'flex' : 'none';
  var arrows = {'academic':'ac-arr','functional':'fn-arr','social':'se-arr','comm':'cm-arr','transition':'tr-arr','ecc-vi':'vi-arr','ecc-dhh':'dh-arr'};
  var arrEl = document.getElementById(arrows[id]);
  if (arrEl) arrEl.innerHTML = hidden ? '&#9650;' : '&#9660;';
}

function addCustom() {
  var inp = document.getElementById('custom-in');
  var val = (inp.value || '').trim();
  if (!val) return;
  inp.value = '';
  var wrap = document.getElementById('custom-chips');
  var btn = document.createElement('button');
  btn.className = 'chip on';
  btn.textContent = val;
  btn.style.background = '#d4880a';
  btn.style.color = '#0d1b35';
  btn.style.borderColor = '#d4880a';
  btn.style.fontWeight = 'bold';
  btn.onclick = function() { btn.classList.toggle('on'); };
  wrap.appendChild(btn);
  togArea(btn);
}

function getDis() {
  var out = [];
  var chips = document.querySelectorAll('#dis-wrap .chip.on');
  for (var i = 0; i < chips.length; i++) out.push(chips[i].textContent.trim());
  return out;
}

function getAreas() {
  var out = [];
  var chips = document.querySelectorAll('#academic .chip.on, #functional .chip.on, #social .chip.on, #comm .chip.on, #transition .chip.on, #ecc-vi .chip.on, #ecc-dhh .chip.on, #custom-chips .chip.on');
  for (var i = 0; i < chips.length; i++) out.push(chips[i].textContent.trim());
  return out;
}

function callAPI(body, cb) {
  var payload = {model: 'claude-sonnet-4-20250514', max_tokens: 800};
  var keys = Object.keys(body);
  for (var i = 0; i < keys.length; i++) payload[keys[i]] = body[keys[i]];
  fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (!r.ok) throw new Error('Server ' + r.status);
    return r.json();
  }).then(function(d) {
    var text = '';
    var c = d.content || [];
    for (var i = 0; i < c.length; i++) text += (c[i].text || '');
    cb(null, text);
  }).catch(function(e) {
    cb(e.message, null);
  });
}

function parseQ(text) {
  try {
    var s = text.indexOf('{');
    var e = text.lastIndexOf('}');
    if (s < 0 || e < 0) return null;
    return JSON.parse(text.slice(s, e + 1));
  } catch(ex) { return null; }
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function dots() {
  return '<div style="text-align:center;padding:16px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#d4880a;margin:0 3px;animation:pulse 1.2s infinite"></span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#d4880a;margin:0 3px;animation:pulse 1.2s infinite;animation-delay:.3s"></span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#d4880a;margin:0 3px;animation:pulse 1.2s infinite;animation-delay:.6s"></span></div>';
}

var CASELAW = 'LEGAL AUTHORITIES: IDEA 2004 34 CFR 300.320 - PLAAFP must describe current academic and functional performance. Endrew F v Douglas County 2017 - IEP must be reasonably calculated to enable progress appropriate in light of circumstances. Rowley 1982 - Two-part FAPE test. Deal v Hamilton County 2004 - Trivial benefit violates IDEA. MC v Antelope Valley 2017 - Procedural violations impeding parent participation constitute FAPE denial. DB v Gloucester Township 2017 - Below grade level without data is insufficient. Adam J v Keller ISD 2003 - All areas affected by disability must be addressed. Lessard v Wilton-Lyndeborough 2008 - PLAAFPs must be based on current evaluative data. OSEP Policy Letter 1999 - PLAAFPs must reflect actual current individual performance. IRIS Center 4-Element Framework - area of need, measurable baseline data, curriculum impact, connection to goals.';

function buildSysPrompt(p) {
  var isVI = false;
  var isDHH = false;
  var isTr = false;
  for (var i = 0; i < p.dis.length; i++) {
    if (p.dis[i].indexOf('Visual') >= 0 || p.dis[i].indexOf('Blind') >= 0) isVI = true;
    if (p.dis[i].indexOf('Hearing') >= 0 || p.dis[i].indexOf('Deaf') >= 0) isDHH = true;
  }
  var trGrades = ['8th Grade','9th Grade','10th Grade','11th Grade','12th Grade'];
  for (var j = 0; j < trGrades.length; j++) {
    if (p.grade === trGrades[j]) isTr = true;
  }
  var s = 'You are an IEP data collector. Return ONE question at a time as a JSON object. No text outside the JSON.\n\n';
  s += CASELAW + '\n\n';
  s += 'STUDENT: ' + p.fn + ' ' + p.ln + ' | ' + p.grade + '\n';
  s += 'DISABILITIES: ' + p.dis.join('; ') + '\n';
  s += 'AREAS: ' + p.areas.join(', ') + '\n\n';
  s += 'RULES:\n';
  s += '1. One question per turn. Return only a JSON object.\n';
  s += '2. Types: fill_blank (numbers/scores), multiselect (known options), scale (1-5), short_text (last resort).\n';
  s += '3. Prompt must be under 10 words.\n';
  s += '4. Cover every area. Track history. Never repeat.\n';
  s += '5. Required per area: baseline score with assessment name, strengths, classroom impact, supports.\n';
  s += '6. If vague answer, follow up for specific numeric data.\n';
  s += '7. When all areas done return: {"done":true,"message":"All data collected. Tap Generate below."}\n';
  if (isVI) s += '8. For ECC/VI areas: collect FVA status, LMA primary medium, OM data.\n';
  if (isDHH) s += '8. For DHH areas: collect audiogram type, communication modality, amplification device.\n';
  if (isTr) s += '8. For transition areas: collect assessment name, student stated preferences.\n';
  s += '\nJSON FORMAT:\n';
  s += '{"area":"area name","dataType":"baseline_score|strengths|classroom_impact|supports|assessment_name","type":"fill_blank|multiselect|scale|short_text","prompt":"Under 10 words","template":"Reads ___ words per minute","unit":"words per minute","options":["A","B","C"],"low_label":"Never","high_label":"Always","compliance_note":"Why legally required","progress":"2 of 5 areas complete"}';
  return s;
}

function buildGenPrompt(p, col) {
  var summary = '';
  var areas = Object.keys(col);
  for (var i = 0; i < areas.length; i++) {
    summary += areas[i] + ':\n';
    for (var j = 0; j < col[areas[i]].length; j++) {
      summary += '  - ' + col[areas[i]][j].dt + ': ' + col[areas[i]][j].ans + '\n';
    }
  }
  var schema = {};
  for (var k = 0; k < p.areas.length; k++) {
    var key = p.areas[k].replace(/[^a-zA-Z0-9]/g, '_');
    schema[key] = 'Write 2-3 paragraphs for ' + p.areas[k] + ': (1) strengths, (2) specific present level with assessment name score date, (3) how deficit affects general curriculum access. Parent-friendly language.';
  }
  var s = 'Generate IDEA 2004-compliant PLAAFP sections and impact statement. No goals.\n\n';
  s += CASELAW + '\n\n';
  s += 'STUDENT: ' + p.fn + ' ' + p.ln + ' | ' + p.grade + ' | ' + p.dis.join('; ') + '\n';
  s += 'AREAS: ' + p.areas.join(', ') + '\n\n';
  s += 'DATA:\n' + summary + '\n';
  s += 'RULES: Cite assessment names and scores. Include strengths. Impact statement names IDEA disability categories. Apply Endrew F standard. No boilerplate. Flag insufficient data.\n\n';
  s += 'Return ONLY valid JSON no markdown:\n';
  s += '{"plaafpSections":' + JSON.stringify(schema);
  s += ',"impactStatement":"Two paragraphs. P1: how disabilities adversely affect involvement in general education with specific data. P2: why specially designed instruction is required citing Endrew F and one additional authority."';
  s += ',"complianceFlags":[]';
  s += ',"legalBasis":{"primaryAuthority":"IDEA 2004, 34 CFR 300.320","caselaw":"Endrew F 2017; Rowley 1982; Deal v Hamilton County 2004","practiceFramework":"IRIS Center 4-Element PLAAFP Framework; NTACT Indicator 13"}';
  s += '}';
  return s;
}

function startInterview() {
  var fn    = (document.getElementById('fn').value || '').trim();
  var ln    = (document.getElementById('ln').value || '').trim();
  var grade = document.getElementById('grade').value;
  var ctx   = (document.getElementById('ctx').value || '').trim();
  var dis   = getDis();
  var areas = getAreas();

  if (!fn || !grade || dis.length === 0 || areas.length === 0) {
    showErr('Please fill in student name, grade, at least one disability, and at least one area of need.');
    return;
  }
  showErr('');
  showStatus('Connecting to AI...');

  prof = {fn: fn, ln: ln, grade: grade, dis: dis, areas: areas, ctx: ctx};
  hist = [];
  coll = {};
  numAns = 0;

  var initMsg = {
    role: 'user',
    content: 'Begin IEP intake for ' + fn + ' ' + ln + ', ' + grade + '. Disabilities: ' + dis.join(', ') + '. Areas: ' + areas.join(', ') + '. Ask the first question.'
  };
  hist = [initMsg];

  callAPI({system: buildSysPrompt(prof), messages: hist}, function(err, text) {
    if (err) {
      showStatus('');
      showErr('Connection error: ' + err);
      return;
    }
    var q = parseQ(text);
    if (!q) {
      showStatus('');
      showErr('Could not read first question. Please try again.');
      return;
    }
    hist.push({role: 'assistant', content: text});
    curQ = q;
    msOpts = [];
    scVal = '';
    showStatus('');
    document.getElementById('phase2').style.display = 'block';
    window.scrollTo(0, document.getElementById('phase2').offsetTop);
    renderQ();
  });
}

function renderQ() {
  var wrap = document.getElementById('q-area');
  var q = curQ;

  if (q && q.done) {
    wrap.innerHTML = '<div style="background:#162950;border:2px solid #1e6e43;border-radius:8px;padding:20px;text-align:center;margin-bottom:12px">'
      + '<div style="font-size:32px;margin-bottom:8px">&#10003;</div>'
      + '<p style="font-size:15px;font-weight:bold;margin-bottom:8px">Data collection complete</p>'
      + '<p style="font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:8px">' + esc(q.message || 'Tap Generate below.') + '</p>'
      + '<p style="font-size:11px;color:#94a3b8;font-family:monospace">' + numAns + ' data points across ' + Object.keys(coll).length + ' areas</p>'
      + '</div>'
      + '<div id="gen-err" style="color:#f87171;font-size:13px;margin:6px 0;display:none"></div>'
      + '<button class="main green" id="gen-btn" onclick="doGenerate()">Generate PLAAFP and Impact Statement</button>';
    return;
  }

  if (!q) { wrap.innerHTML = dots(); return; }

  var pct = Math.min((numAns / (prof.areas.length * 4)) * 100, 95);
  var html = '';

  html += '<div style="background:#0d1b35;border-radius:4px;height:6px;overflow:hidden;margin-bottom:8px"><div style="height:100%;background:linear-gradient(90deg,#d4880a,#f0a820);border-radius:4px;width:' + pct + '%;transition:width .4s"></div></div>';
  html += '<p style="font-size:11px;color:#94a3b8;font-family:monospace;margin-bottom:12px">' + esc(q.progress || (numAns + ' questions answered')) + '</p>';

  html += '<div style="background:#162950;border:1px solid #2a4e9a;border-left:4px solid #d4880a;border-radius:8px;padding:16px;margin-bottom:12px">';
  html += '<p style="font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#f0a820;margin-bottom:8px">' + esc(q.area || '') + '</p>';
  html += '<p style="font-size:17px;line-height:1.5;font-weight:bold;margin-bottom:12px">' + esc(q.prompt || '') + '</p>';

  if (q.compliance_note) {
    html += '<p style="font-size:11px;color:#94a3b8;font-family:monospace;font-style:italic;margin-bottom:12px;line-height:1.5;border-left:2px solid #2a4e9a;padding-left:8px">' + esc(q.compliance_note) + '</p>';
  }

  if (q.type === 'fill_blank') {
    if (q.template) {
      var parts = q.template.split('___');
      html += '<p style="font-size:14px;color:#94a3b8;line-height:2.6;text-align:center;margin-bottom:8px">';
      for (var pi = 0; pi < parts.length; pi++) {
        html += esc(parts[pi]);
        if (pi < parts.length - 1) {
          html += '<input id="fv" type="number" style="background:#0d1b35;border:2px solid #d4880a;border-radius:5px;padding:8px;color:#f8f4ec;font-size:16px;width:110px;text-align:center;outline:none;margin:0 4px;display:inline-block"/>';
        }
      }
      html += '</p>';
    } else {
      html += '<input id="fv" type="text" placeholder="Enter value" style="border:2px solid #d4880a;text-align:center;margin-bottom:8px"/>';
    }
    if (q.unit) html += '<p style="font-size:11px;color:#94a3b8;font-family:monospace;text-align:center;margin-bottom:8px">' + esc(q.unit) + '</p>';
  }

  if (q.type === 'multiselect') {
    var opts = q.options || [];
    for (var oi = 0; oi < opts.length; oi++) {
      var optOn = msOpts.indexOf(opts[oi]) >= 0;
      var optId = 'opt_' + oi;
      html += '<button id="' + optId + '" class="main" onclick="toggleOpt(' + oi + ')" style="text-align:left;display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:6px;border-radius:6px;font-weight:normal;border:2px solid ' + (optOn ? '#f0a820' : '#2a4e9a') + ';background:' + (optOn ? '#1f3d7a' : '#0d1b35') + ';color:' + (optOn ? '#f8f4ec' : '#94a3b8') + '">'
        + '<span style="font-size:18px;flex-shrink:0">' + (optOn ? '&#9745;' : '&#9744;') + '</span>'
        + '<span>' + esc(opts[oi]) + '</span></button>';
    }
  }

  if (q.type === 'scale') {
    html += '<div style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0">';
    html += '<span style="font-size:11px;color:#94a3b8;font-family:monospace;flex:1">' + esc(q.low_label || '') + '</span>';
    for (var n = 1; n <= 5; n++) {
      var scOn = scVal === String(n);
      html += '<button onclick="setScale(' + n + ')" style="width:50px;height:50px;border-radius:50%;border:2px solid ' + (scOn ? '#d4880a' : '#2a4e9a') + ';background:' + (scOn ? '#d4880a' : '#0d1b35') + ';color:' + (scOn ? '#0d1b35' : '#94a3b8') + ';font-size:18px;font-weight:bold;font-family:Georgia,serif">' + n + '</button>';
    }
    html += '<span style="font-size:11px;color:#94a3b8;font-family:monospace;flex:1;text-align:right">' + esc(q.high_label || '') + '</span>';
    html += '</div>';
  }

  if (q.type === 'short_text') {
    html += '<textarea id="sv" rows="3" placeholder="Type your response..." style="resize:vertical;line-height:1.5"></textarea>';
  }

  html += '<div id="qerr" style="color:#f87171;font-size:13px;margin:6px 0;display:none"></div>';
  html += '<button class="main green" onclick="submitAns()">Next</button>';
  html += '</div>';

  if (numAns >= prof.areas.length * 2) {
    html += '<button class="main" style="background:transparent;border:1px solid #2a4e9a;color:#94a3b8;padding:10px;font-size:12px;font-family:monospace;margin-top:6px" onclick="skipToGen()">Skip to Generate</button>';
  }

  wrap.innerHTML = html;
  setTimeout(function() {
    var f = document.getElementById('fv') || document.getElementById('sv');
    if (f) { try { f.focus(); } catch(ex) {} }
  }, 200);
}

function toggleOpt(idx) {
  var opt = (curQ.options || [])[idx];
  if (!opt) return;
  var pos = msOpts.indexOf(opt);
  if (pos >= 0) msOpts.splice(pos, 1);
  else msOpts.push(opt);
  renderQ();
}

function setScale(n) {
  scVal = String(n);
  renderQ();
}

function skipToGen() {
  curQ = {done: true, message: 'Using data collected so far.'};
  renderQ();
}

function submitAns() {
  var q = curQ;
  var ans = '';
  var errEl = document.getElementById('qerr');

  if (q.type === 'fill_blank') {
    var fv = document.getElementById('fv');
    if (!fv || !(fv.value || '').trim()) {
      if (errEl) { errEl.textContent = 'Please fill in the blank.'; errEl.style.display = 'block'; }
      return;
    }
    ans = q.template ? q.template.replace('___', fv.value.trim()) : fv.value.trim();
    if (q.unit) ans += ' (' + q.unit + ')';
  } else if (q.type === 'multiselect') {
    if (!msOpts.length) {
      if (errEl) { errEl.textContent = 'Please select at least one option.'; errEl.style.display = 'block'; }
      return;
    }
    ans = msOpts.join(', ');
  } else if (q.type === 'scale') {
    if (!scVal) {
      if (errEl) { errEl.textContent = 'Please select a rating.'; errEl.style.display = 'block'; }
      return;
    }
    ans = scVal + '/5 (' + (q.low_label || '') + ' to ' + (q.high_label || '') + ')';
  } else {
    var sv = document.getElementById('sv');
    if (!sv || !(sv.value || '').trim()) {
      if (errEl) { errEl.textContent = 'Please enter a response.'; errEl.style.display = 'block'; }
      return;
    }
    ans = sv.value.trim();
  }

  var area = q.area || 'General';
  if (!coll[area]) coll[area] = [];
  coll[area].push({dt: q.dataType, ans: ans});
  numAns++;
  msOpts = [];
  scVal = '';
  hist.push({role: 'user', content: '[Area: ' + area + ' | DataType: ' + (q.dataType || '') + '] ' + ans});
  document.getElementById('q-area').innerHTML = dots();

  callAPI({system: buildSysPrompt(prof), messages: hist}, function(err, text) {
    if (err) {
      document.getElementById('q-area').innerHTML = '<p style="color:#f87171;font-size:13px">Error: ' + esc(err) + '</p><button class="main green" onclick="renderQ()">Retry</button>';
      return;
    }
    hist.push({role: 'assistant', content: text});
    var next = parseQ(text);
    curQ = (!next || next.done) ? {done: true, message: (next && next.message) ? next.message : 'All data collected. Tap Generate below.'} : next;
    renderQ();
  });
}

function doGenerate() {
  var btn = document.getElementById('gen-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating...'; }
  var errEl = document.getElementById('gen-err');
  if (errEl) errEl.style.display = 'none';

  document.getElementById('q-area').innerHTML += dots();

  callAPI({messages: [{role: 'user', content: buildGenPrompt(prof, coll)}]}, function(err, text) {
    if (err) {
      if (errEl) { errEl.textContent = 'Generation failed: ' + err; errEl.style.display = 'block'; }
      if (btn) { btn.disabled = false; btn.textContent = 'Generate PLAAFP and Impact Statement'; }
      return;
    }
    try {
      result = JSON.parse(text.replace(/```json|```/g, '').trim());
      curTab = 'plaafp';
      document.getElementById('phase2').style.display = 'none';
      document.getElementById('phase3').style.display = 'block';
      window.scrollTo(0, document.getElementById('phase3').offsetTop);
      renderOut();
    } catch(ex) {
      if (errEl) { errEl.textContent = 'Could not parse output. Please try again.'; errEl.style.display = 'block'; }
      if (btn) { btn.disabled = false; btn.textContent = 'Generate PLAAFP and Impact Statement'; }
    }
  });
}

function renderOut() {
  var tabs = ['plaafp', 'impact', 'legal'];
  var labels = ['PLAAFP', 'Impact', 'Legal'];
  var tabRow = document.getElementById('tab-row');
  tabRow.innerHTML = '';
  for (var i = 0; i < tabs.length; i++) {
    var btn = document.createElement('button');
    var isOn = curTab === tabs[i];
    btn.textContent = labels[i];
    btn.style.cssText = 'flex:1;padding:9px 4px;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-family:monospace;border:1px solid ' + (isOn ? '#d4880a' : '#2a4e9a') + ';border-radius:5px 5px 0 0;background:' + (isOn ? '#d4880a' : '#162950') + ';color:' + (isOn ? '#0d1b35' : '#94a3b8') + ';font-weight:' + (isOn ? 'bold' : 'normal') + ';cursor:pointer;-webkit-appearance:none';
    (function(t) { btn.onclick = function() { curTab = t; renderOut(); }; })(tabs[i]);
    tabRow.appendChild(btn);
  }

  var box = document.getElementById('out-box');
  var out = result || {};
  var secs = out.plaafpSections || {};
  var flags = out.complianceFlags || [];
  var html = '';

  if (curTab === 'plaafp') {
    html += '<p style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#f0a820;margin-bottom:6px">Present Levels of Academic Achievement and Functional Performance</p>';
    html += '<p style="font-size:9px;color:#94a3b8;font-family:monospace;margin-bottom:12px">IDEA 300.320 - IRIS Center - Endrew F 2017 - Rowley 1982</p>';
    if (flags.length) {
      for (var f = 0; f < flags.length; f++) {
        html += '<span style="display:inline-block;background:#7f1d1d;color:#fca5a5;font-size:10px;font-family:monospace;padding:2px 7px;border-radius:3px;margin:0 4px 6px 0">Warning: ' + esc(flags[f]) + '</span>';
      }
    }
    for (var ai = 0; ai < prof.areas.length; ai++) {
      var akey = prof.areas[ai].replace(/[^a-zA-Z0-9]/g, '_');
      var atext = secs[akey] || secs[prof.areas[ai]] || '(Insufficient data for this area.)';
      html += '<p style="font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#f0a820;margin-bottom:8px;margin-top:' + (ai > 0 ? '16px' : '0') + '">' + esc(prof.areas[ai]) + '</p>';
      html += '<p style="font-size:13px;line-height:1.85;color:#f8f4ec;white-space:pre-wrap">' + esc(atext) + '</p>';
      if (ai < prof.areas.length - 1) html += '<hr style="border:none;border-top:1px solid #2a4e9a;margin:14px 0"/>';
    }
  }

  if (curTab === 'impact') {
    html += '<p style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#f0a820;margin-bottom:6px">Impact Statement</p>';
    html += '<p style="font-size:9px;color:#94a3b8;font-family:monospace;margin-bottom:12px">34 CFR 300.8 - Endrew F 2017 - MC v Antelope Valley 2017</p>';
    html += '<p style="font-size:13px;line-height:1.85;color:#f8f4ec;white-space:pre-wrap">' + esc(out.impactStatement || '') + '</p>';
  }

  if (curTab === 'legal') {
    html += '<p style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#f0a820;margin-bottom:10px">Legal and Practice Framework</p>';
    html += '<div style="background:#0a1628;border:1px solid #2a4e9a;border-radius:5px;padding:11px;font-size:11px;font-family:monospace;color:#86efac;line-height:1.6">';
    if (out.legalBasis) {
      var keys = Object.keys(out.legalBasis);
      for (var li = 0; li < keys.length; li++) {
        if (out.legalBasis[keys[li]]) {
          html += '<div style="margin-bottom:7px"><span style="color:#f0a820">' + esc(keys[li]) + ': </span><span>' + esc(out.legalBasis[keys[li]]) + '</span></div>';
        }
      }
    }
    html += '</div>';
    if (flags.length) {
      html += '<p style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;color:#f87171;margin:10px 0 6px">Compliance Flags</p>';
      for (var fi = 0; fi < flags.length; fi++) {
        html += '<div style="background:#7f1d1d;color:#fca5a5;font-size:10px;font-family:monospace;padding:2px 7px;border-radius:3px;margin-bottom:5px">Warning: ' + esc(flags[fi]) + '</div>';
      }
    } else {
      html += '<p style="font-size:11px;color:#86efac;font-family:monospace;margin-top:10px">No compliance flags raised.</p>';
    }
  }

  box.innerHTML = html;
}
</script>
<style>@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}</style>
</body>
</html>
