<script>
'use strict';
const e = React.createElement;
const {useState, useEffect, useRef} = React;

// ── Config ────────────────────────────────────────────────────────────────────
const API_URL = “https://iep-plaafp.onrender.com/api/messages”;
const C = {

amber:”#d4880a”,amberLight:”#f0a820”,cream:”#f8f4ec”,slate:”#94a3b8”,
white:”#ffffff”,green:”#1e6e43”,greenLight:”#2d9e62”,purple:”#5b21b6”,teal:”#0f766e”,
};

const AREA_GROUPS = [
{group:“Academic Areas”,color:C.navyLight,accent:C.amberLight,areas:[

“Mathematics – Computation”,“Mathematics – Problem Solving”,

{group:“Functional & Adaptive Areas”,color:C.green,accent:”#6ee7b7”,areas:[

{group:“Communication & Motor”,color:C.teal,accent:”#5eead4”,areas:[

{group:“Transition (NTACT / IDEA §300.43)”,color:”#92400e”,accent:”#fcd34d”,areas:[
“Postsecondary Education & Training”,“Employment & Career Readiness”,
“Independent Living Skills”,“Transportation & Mobility (Transition)”,“Financial Literacy”]},
{group:“ECC – Visual Impairment (IDEA / TSBVI)”,color:”#1e40af”,accent:”#93c5fd”,areas:[

{group:“ECC – Deaf / Hard of Hearing”,color:”#065f46”,accent:”#6ee7b7”,areas:[

];

// ── Case law library (embedded in prompts) ────────────────────────────────────
const CASELAW = `KEY LEGAL AUTHORITIES FOR PLAAFP COMPLIANCE:

- IDEA 2004, 34 CFR §300.320(a)(1)-(2): PLAAFP must describe current academic AND functional performance; how disability affects general curriculum access; must have baseline data for each area.
- Endrew F. v. Douglas County (2017, SCOTUS): IEP must be “reasonably calculated to enable progress appropriate in light of the child’s circumstances.” Vague PLAAFPs cannot support this standard.
- Rowley (1982): Two-part FAPE test — procedural compliance + meaningful educational benefit. PLAAFPs lacking specific data fail the procedural prong.
- Deal v. Hamilton County (6th Cir. 2004): Trivial benefit violates IDEA. PLAAFPs must capture actual current performance to anchor meaningful goals.
- M.C. v. Antelope Valley (9th Cir. 2017): Procedural violations that impede parental participation constitute FAPE denial. PLAAFPs must be parent-accessible.
- D.B. v. Gloucester Township (D.N.J. 2017): PLAAFPs must be specific enough to design appropriate goals. “Performs below grade level” without data is insufficient.
- Susan N. v. Wilson SD (3d Cir. 1995): Omitting current performance levels may deny FAPE where it impedes parent participation.
- Adam J. v. Keller ISD (5th Cir. 2003): All areas affected by disability must be addressed — not just academic.
- Lessard v. Wilton-Lyndeborough (1st Cir. 2008): PLAAFPs must be based on current evaluative data, not historical.
- Flour Bluff ISD v. Katherine M. (5th Cir. 1996): Boilerplate copy-paste PLAAFPs that don’t reflect individual data fail IDEA.
- OSEP Policy Letter, 64 Fed. Reg. 12,406 (1999): PLAAFPs must describe actual current individual performance.
- IRIS Center 4-Element Framework: (1) area of need, (2) measurable baseline data, (3) curriculum impact, (4) connection to goals/services. “Stranger test”: a new teacher should be able to instruct this student tomorrow based solely on the PLAAFP.`;

// ── System prompt: structured interview ───────────────────────────────────────
function buildInterviewPrompt(profile) {
const isVI  = profile.disabilities.some(d => d.includes(“Visual”)||d.includes(“Blind”));
const isDHH = profile.disabilities.some(d => d.includes(“Hearing”)||d.includes(“Deaf”));
const isTr  = [“8th Grade”,“9th Grade”,“10th Grade”,“11th Grade”,“12th Grade”].includes(profile.grade);
return `You are an IEP data collector running a structured compliance interview. Return ONE question at a time as a JSON object. No prose outside the JSON.

${CASELAW}

STUDENT: ${profile.firstName} ${profile.lastName} | ${profile.grade}
DISABILITIES: ${profile.disabilities.join(”; “)}
AREAS TO COVER: ${profile.areas.join(”, “)}

RULES:

1. One question per response. Always return a single JSON object.
1. Choose type: “fill_blank” (scores/numbers), “multiselect” (known options), “scale” (1-5 rating), or “short_text” (observations only).
1. Keep “prompt” under 10 words.
1. Cycle through all areas. Track the conversation history to avoid repeating answered questions.
1. Required data per area: baseline score, strengths, classroom impact, supports in place.
1. If a vague answer is given, follow up asking for specific numeric data — cite Endrew F. (2017).
1. When all areas are covered, return: {“done”:true,“message”:“All data collected. Tap Generate below.”}
   ${isVI  ? ‘8. For ECC/VI areas: collect FVA completion, LMA primary medium, O&M assessment data.’ : ‘’}
   ${isDHH ? ‘8. For DHH areas: collect audiogram type/degree, communication modality, amplification device.’ : ‘’}
   ${isTr  ? ‘8. For transition areas: collect transition assessment name and student stated interests/preferences.’ : ‘’}

JSON FORMAT:
{
“area”: “exact area name from the list”,
“dataType”: “baseline_score|strengths|classroom_impact|supports|parent_input|assessment_name|ecc_vi|ecc_dhh|transition”,
“type”: “fill_blank|multiselect|scale|short_text”,
“prompt”: “Question in 10 words or fewer”,
“template”: “Student reads ___ words per minute”,
“unit”: “words per minute”,
“options”: [“Option A”,“Option B”,“Option C”],
“low_label”: “Never”,
“high_label”: “Always”,
“compliance_note”: “Why this data is legally required (one sentence)”,
“progress”: “2 of 5 areas complete”
}
Only include keys relevant to the question type.`;
}

// ── Generation prompt ─────────────────────────────────────────────────────────
function buildGenerationPrompt(profile, collectedData) {
const summary = Object.entries(collectedData).map(([area, items]) =>
`${area}:\n${items.map(i => `  - ${i.dataType}: ${i.answer}`).join('\n')}`
).join(’\n\n’);

const areaKeys = profile.areas.map(a => a.replace(/[^a-zA-Z0-9]/g,’_’));
const schema = {};
profile.areas.forEach((area,i) => {
schema[areaKeys[i]] = `Write 2-3 paragraphs for ${area}: (1) strengths, (2) specific present level with assessment name/score/date per IRIS Center stranger test, (3) how deficit affects general curriculum access per IDEA §300.320(a)(1) and Endrew F. Parent-friendly, no unexplained acronyms.`;
});

return `Generate IDEA 2004-compliant PLAAFP sections and impact statement. No goals.

${CASELAW}

STUDENT: ${profile.firstName} ${profile.lastName} | ${profile.grade} | ${profile.disabilities.join(”; “)}
AREAS: ${profile.areas.join(”, “)}

COLLECTED DATA:
${summary}

OUTPUT RULES:

1. Cite specific assessment names and scores from the collected data — no placeholders.
1. Include strengths in every section per Adam J. v. Keller ISD.
1. Impact statement must name exact IDEA §300.8 disability categories.
1. Apply Endrew F. standard: language must convey programming is “reasonably calculated to enable ${profile.firstName} to make progress appropriate in light of their circumstances.”
1. Per OSEP 1999: every sentence must reflect ${profile.firstName}’s individual data, not boilerplate.
1. Flag any area with insufficient data in complianceFlags.
1. 8th-grade reading level. Spell out all acronyms on first use.

Return ONLY valid JSON, no markdown fences, no text outside the object:
{
“plaafpSections”: ${JSON.stringify(schema,null,2)},
“impactStatement”: “Two paragraphs. P1: how ${profile.firstName}’s specific IDEA §300.8 disability categories adversely affect involvement and progress in general education — cite specific data. P2: why specially designed instruction is required, citing Endrew F. and one additional case or regulation.”,
“complianceFlags”: [],
“legalBasis”: {
“primaryAuthority”: “IDEA 2004, 34 CFR §300.320(a)(1)-(2)”,
“caselaw”: “Endrew F. (2017); Rowley (1982); Deal v. Hamilton County (6th Cir. 2004); M.C. v. Antelope Valley (9th Cir. 2017); Adam J. v. Keller ISD (5th Cir. 2003)”,
“osepGuidance”: “OSEP Policy Letter, 64 Fed. Reg. 12,406 (1999)”,
“practiceFramework”: “IRIS Center 4-Element PLAAFP Framework; NTACT:C Indicator 13”
},
“apiResponse”: {
“status”:“success”,“version”:“4.0”,
“generated_at”:”${new Date().toISOString()}”,
“disabilities”:${JSON.stringify(profile.disabilities)},
“areas_of_need”:${JSON.stringify(profile.areas)},
“compliance_flags”:[],
“sections”:{“plaafp_by_area”:{},“impact_statement”:””,“legal_basis”:{}}
}
}`;
}

// ── API helper ────────────────────────────────────────────────────────────────
async function callAPI(body) {
const res = await fetch(API_URL, {
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body: JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:800,…body}),
});
if (!res.ok) throw new Error(‘Server error ’ + res.status);
return res.json();
}
function extractText(data) {
return (data.content||[]).map(b=>b.text||’’).join(’’);
}
function parseQ(text) {
try {
const s = text.indexOf(’{’), en = text.lastIndexOf(’}’);
if (s<0||en<0) return null;
return JSON.parse(text.slice(s,en+1));
} catch(e) { return null; }
}

// ── Shared UI helpers ─────────────────────────────────────────────────────────
function div(style, …children) { return e(‘div’,{style},children.length===1?children[0]:children); }
function txt(tag, style, content, extra) { return e(tag,{style,…extra},content); }

function Dots() {
return div({padding:‘10px 0’,textAlign:‘center’},
e(‘span’,{style:{display:‘inline-block’,width:8,height:8,borderRadius:‘50%’,background:C.amber,margin:‘0 3px’,animation:‘pulse 1.2s infinite’}}),
e(‘span’,{style:{display:‘inline-block’,width:8,height:8,borderRadius:‘50%’,background:C.amber,margin:‘0 3px’,animation:‘pulse 1.2s infinite’,animationDelay:’.3s’}}),
e(‘span’,{style:{display:‘inline-block’,width:8,height:8,borderRadius:‘50%’,background:C.amber,margin:‘0 3px’,animation:‘pulse 1.2s infinite’,animationDelay:’.6s’}}),
);
}

function Btn({label, onClick, disabled, style}) {
return e(‘button’,{
onClick, disabled,
className:‘tap’,
style:{border:‘none’,cursor:disabled?‘default’:‘pointer’,opacity:disabled?.6:1,fontFamily:‘Georgia,serif’,fontWeight:‘bold’,…style}
}, label);
}

// ── INTAKE FORM ───────────────────────────────────────────────────────────────
function IntakeForm({onStart}) {
const [profile, setProfile] = useState({firstName:’’,lastName:’’,grade:’’,disabilities:[],areas:[],context:’’});
const [customInput, setCustomInput] = useState(’’);
const [customAreas, setCustomAreas] = useState([]);
const [expanded, setExpanded] = useState({});
const [loading, setLoading] = useState(false);
const [error, setError] = useState(’’);

function toggle(field, val) {
setProfile(p=>({…p,[field]:p[field].includes(val)?p[field].filter(v=>v!==val):[…p[field],val]}));
}
function addCustom() {
const t = customInput.trim();
if (!t||ALL_AREAS.includes(t)||customAreas.includes(t)) return;
setCustomAreas(a=>[…a,t]);
setProfile(p=>({…p,areas:[…p.areas,t]}));
setCustomInput(’’);
}

async function handleStart() {
if (!profile.firstName||!profile.grade||!profile.disabilities.length||!profile.areas.length) {
setError(‘Please fill in: student name, grade, at least one disability, and at least one area of need.’); return;
}
setError(’’); setLoading(true);
try {
const initMsg = {role:‘user’,content:`Begin IEP intake for ${profile.firstName} ${profile.lastName}, ${profile.grade}. Disabilities: ${profile.disabilities.join(', ')}. Areas: ${profile.areas.join(', ')}. Start first question.`};
const data = await callAPI({system:buildInterviewPrompt(profile),messages:[initMsg]});
const text = extractText(data);
const q = parseQ(text);
if (!q) throw new Error(‘Could not parse first question from AI.’);
onStart(profile, q, [initMsg,{role:‘assistant’,content:text}]);
} catch(err) { setError(’Connection error: ’+err.message); }
finally { setLoading(false); }
}

const labelStyle = {display:‘block’,fontSize:12,color:C.amberLight,marginBottom:4};
const inputStyle = {width:‘100%’,background:C.navy,border:`1px solid ${C.navyBorder}`,borderRadius:5,padding:‘10px 12px’,color:C.cream,fontSize:16,marginBottom:10,outline:‘none’};
const chipBase   = {padding:‘6px 10px’,borderRadius:5,fontSize:12,border:‘1px solid’,userSelect:‘none’,cursor:‘pointer’};

return div({background:C.navyMid,border:`1px solid ${C.navyBorder}`,borderRadius:8,padding:16},
txt(‘p’,{fontSize:9,letterSpacing:2,textTransform:‘uppercase’,color:C.amberLight,fontFamily:‘monospace’,margin:‘0 0 14px 0’},‘STUDENT PROFILE’),

```
txt('label',labelStyle,'First Name'),
e('input',{style:inputStyle,value:profile.firstName,placeholder:'e.g. Jordan',onChange:ev=>setProfile(p=>({...p,firstName:ev.target.value}))}),

txt('label',labelStyle,'Last Name'),
e('input',{style:inputStyle,value:profile.lastName,placeholder:'e.g. Smith',onChange:ev=>setProfile(p=>({...p,lastName:ev.target.value}))}),

txt('label',labelStyle,'Grade Level'),
e('select',{style:inputStyle,value:profile.grade,onChange:ev=>setProfile(p=>({...p,grade:ev.target.value}))},
  e('option',{value:''},'— Select —'),
  GRADES.map(g=>e('option',{key:g,value:g},g))
),

txt('label',labelStyle,'Disability Category — IDEA §300.8 (select all that apply)'),
div({display:'flex',flexWrap:'wrap',gap:6,marginBottom:10},
  DISABILITIES.map(d=>{
    const on = profile.disabilities.includes(d);
    return div({...chipBase,background:on?C.amber:C.navy,color:on?C.navy:C.slate,borderColor:on?C.amber:C.navyBorder,fontWeight:on?'bold':'normal',key:d,onClick:()=>toggle('disabilities',d)},d);
  })
),

txt('label',{...labelStyle,marginTop:8},'Areas of Need'),
txt('p',{fontSize:10,color:C.slate,fontFamily:'monospace',marginBottom:6},profile.areas.length+' selected'),

...AREA_GROUPS.map(group=>{
  const open = expanded[group.group]!==false;
  const sel  = group.areas.filter(a=>profile.areas.includes(a)).length;
  return div({marginBottom:8,key:group.group},
    div({
      fontSize:10,letterSpacing:'1.5px',textTransform:'uppercase',fontFamily:'monospace',
      color:group.accent,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'6px 9px',borderRadius:4,background:C.navy,border:`1px solid ${group.color}`,marginBottom:open?5:0,
      className:'tap',onClick:()=>setExpanded(ex=>({...ex,[group.group]:!ex[group.group]}))
    },
      e('span',null,group.group),
      e('span',{style:{fontSize:10,color:C.slate}},(sel>0?sel+' ✓ ':'')+' '+(open?'▲':'▼'))
    ),
    open && div({display:'flex',flexWrap:'wrap',gap:5,paddingLeft:4,marginTop:4},
      group.areas.map(area=>{
        const on = profile.areas.includes(area);
        return div({
          ...chipBase,key:area,
          background:on?group.color:C.navy,
          color:on?group.accent:C.slate,
          borderColor:on?group.accent:C.navyBorder,
          fontWeight:on?'bold':'normal',
          onClick:()=>toggle('areas',area)
        },area);
      })
    )
  );
}),

customAreas.length>0 && div({display:'flex',flexWrap:'wrap',gap:5,marginTop:4,marginBottom:8},
  customAreas.map(a=>{
    const on=profile.areas.includes(a);
    return div({...chipBase,key:a,background:on?'#374151':C.navy,color:on?C.amberLight:C.slate,borderColor:on?C.amberLight:C.navyBorder,fontWeight:on?'bold':'normal',onClick:()=>toggle('areas',a)},a);
  })
),

div({display:'flex',gap:6,marginBottom:10},
  e('input',{style:{...inputStyle,marginBottom:0,flex:1},value:customInput,placeholder:'Add custom area…',
    onChange:ev=>setCustomInput(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&addCustom()}),
  Btn({label:'+ Add',onClick:addCustom,style:{background:C.amber,color:C.navy,borderRadius:5,padding:'10px 14px',fontSize:13}})
),

txt('label',{...labelStyle,marginTop:4},'Additional Context (optional)'),
e('textarea',{style:{...inputStyle,marginBottom:12,resize:'vertical',lineHeight:1.5,minHeight:70},value:profile.context,
  placeholder:'e.g. recent eval, related services, parent concerns…',onChange:ev=>setProfile(p=>({...p,context:ev.target.value}))}),

error && txt('p',{color:'#f87171',fontSize:12,marginBottom:8,fontFamily:'monospace'},error),
Btn({label:loading?'Connecting…':'Begin Compliance Interview →',onClick:handleStart,disabled:loading,
  style:{width:'100%',background:`linear-gradient(135deg,${C.amber},#f0a820)`,color:C.navy,borderRadius:7,padding:14,fontSize:16}}),
loading && Dots()
```

);
}

// ── INTERVIEW PANEL ───────────────────────────────────────────────────────────
function InterviewPanel({profile, initialQ, initialHistory, onComplete}) {
const [currentQ,      setCurrentQ]      = useState(initialQ);
const [history,       setHistory]       = useState(initialHistory);
const [collectedData, setCollectedData] = useState({});
const [answeredQs,    setAnsweredQs]    = useState(0);
const [fillVal,       setFillVal]       = useState(’’);
const [selectedOpts,  setSelectedOpts]  = useState([]);
const [scaleVal,      setScaleVal]      = useState(’’);
const [shortVal,      setShortVal]      = useState(’’);
const [loading,       setLoading]       = useState(false);
const [error,         setError]         = useState(’’);
const topRef = useRef(null);

useEffect(()=>{ topRef.current&&topRef.current.scrollIntoView({behavior:‘smooth’,block:‘start’}); },[currentQ]);

const totalEst = profile.areas.length * 4;
const pct      = Math.min((answeredQs/totalEst)*100, 95);
const group    = AREA_GROUPS.find(g=>g.areas.includes(currentQ&&currentQ.area));
const accent   = group?group.accent:C.amberLight;

async function submit() {
let answerText = ‘’;
if (currentQ.type===‘fill_blank’) {
if (!fillVal.trim()) { setError(‘Please fill in the blank.’); return; }
answerText = currentQ.template ? currentQ.template.replace(’___’,fillVal.trim()) : fillVal.trim();
if (currentQ.unit) answerText += ’ (’+currentQ.unit+’)’;
} else if (currentQ.type===‘multiselect’) {
if (!selectedOpts.length) { setError(‘Please select at least one option.’); return; }
answerText = selectedOpts.join(’, ‘);
} else if (currentQ.type===‘scale’) {
if (!scaleVal) { setError(‘Please select a rating.’); return; }
answerText = scaleVal+’/5 (’+currentQ.low_label+’ to ‘+currentQ.high_label+’)’;
} else {
if (!shortVal.trim()) { setError(‘Please enter a response.’); return; }
answerText = shortVal.trim();
}
setError(’’);
const area = currentQ.area||‘General’;
setCollectedData(prev=>({…prev,[area]:[…(prev[area]||[]),{dataType:currentQ.dataType,answer:answerText}]}));
setAnsweredQs(n=>n+1);
const userMsg = {role:‘user’,content:`[Area: ${area} | Type: ${currentQ.dataType}] ${answerText}`};
const newHistory = […history, userMsg];
setFillVal(’’); setSelectedOpts([]); setScaleVal(’’); setShortVal(’’);
setLoading(true);
try {
const data = await callAPI({system:buildInterviewPrompt(profile),messages:newHistory});
const text = extractText(data);
const aiMsg = {role:‘assistant’,content:text};
const nextQ = parseQ(text);
setHistory([…newHistory,aiMsg]);
if (!nextQ||nextQ.done) {
setCurrentQ({done:true,message:nextQ&&nextQ.message?nextQ.message:‘All data collected. Tap Generate below.’});
} else {
setCurrentQ(nextQ);
}
} catch(err) { setError(’API error: ’+err.message); }
finally { setLoading(false); }
}

function skipToGenerate() {
setCurrentQ({done:true,message:‘Using data collected so far.’});
}

const cardStyle = {background:C.navyMid,border:`1px solid ${C.navyBorder}`,borderLeft:`4px solid ${C.amber}`,borderRadius:8,padding:16,marginBottom:12,className:‘fadeIn’};
const submitStyle = {width:‘100%’,marginTop:12,background:`linear-gradient(135deg,${C.green},${C.greenLight})`,color:C.white,borderRadius:7,padding:13,fontSize:15};

// ── Done state ──
if (currentQ&&currentQ.done) {
return div({},
div({ref:topRef}),
div({background:C.navyMid,border:`2px solid ${C.green}`,borderRadius:8,padding:20,textAlign:‘center’,marginBottom:12},
txt(‘div’,{fontSize:32,marginBottom:8},‘✓’),
txt(‘p’,{fontSize:16,fontWeight:‘bold’,color:C.cream,marginBottom:6},‘Data collection complete’),
txt(‘p’,{fontSize:13,color:C.slate,lineHeight:1.6,marginBottom:10},currentQ.message),

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
const [phase,   setPhase]   = useState(‘intake’);
const [profile, setProfile] = useState(null);
const [initQ,   setInitQ]   = useState(null);
const [initH,   setInitH]   = useState([]);
const [output,  setOutput]  = useState(null);
const [loading, setLoading] = useState(false);
const [error,   setError]   = useState(’’);

function handleStart(prof, q, history) {
setProfile(prof); setInitQ(q); setInitH(history);
setPhase(‘interview’);
}

async function handleComplete(collectedData) {
setLoading(true); setError(’’);
try {
const data   = await callAPI({messages:[{role:‘user’,content:buildGenerationPrompt(profile,collectedData)}]});
const raw    = extractText(data);
const parsed = JSON.parse(raw.replace(/`json|`/g,’’).trim());
if (parsed.apiResponse) {
parsed.apiResponse.sections.plaafp_by_area   = parsed.plaafpSections;
parsed.apiResponse.sections.impact_statement = parsed.impactStatement;
parsed.apiResponse.sections.legal_basis      = parsed.legalBasis;
parsed.apiResponse.compliance_flags          = parsed.complianceFlags||[];
}
setOutput(parsed); setPhase(‘output’);
} catch(err) { setError(’Generation failed: ’+err.message); }
finally { setLoading(false); }
}

const stepStyle = (active) => ({display:‘flex’,alignItems:‘center’,gap:6,opacity:active?1:.4});
const dotStyle  = (active) => ({display:‘inline-flex’,alignItems:‘center’,justifyContent:‘center’,borderRadius:‘50%’,width:19,height:19,fontSize:10,fontWeight:‘bold’,flexShrink:0,background:active?C.amber:C.navyLight,color:active?C.navy:C.slate});

return div({minHeight:‘100vh’,background:C.navy,paddingBottom:40},
