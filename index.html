// ─────────────────────────────────────────────────────────────────────────────
// CASE LAW & COMPLIANCE LIBRARY
// This is embedded in the generation prompt so the AI can cite specific
// legal authority for each compliance decision it makes in the output.
// ─────────────────────────────────────────────────────────────────────────────
const CASE_LAW = `
FEDERAL CASE LAW & REGULATORY AUTHORITY FOR PRESENT LEVELS:

1. Board of Education v. Rowley, 458 U.S. 176 (1982): Established the two-part FAPE test —
   (a) procedural compliance with IDEA, and (b) IEP reasonably calculated to confer educational
   benefit. PLAAFPs that lack specific data fail the procedural prong.
1. Endrew F. v. Douglas County School District Re-1, 580 U.S. ___ (2017): SCOTUS raised the
   FAPE standard beyond de minimis — IEP must be “reasonably calculated to enable a child to
   make progress appropriate in light of the child’s circumstances.” PLAAFPs must capture enough
   granular, individualized data to demonstrate that the resulting program is genuinely ambitious.
   Vague or generic present levels cannot support this standard.
1. Deal v. Hamilton County Board of Education, 392 F.3d 840 (6th Cir. 2004): Held that an IEP
   providing only trivial educational benefit violates IDEA. Reinforces that PLAAFPs must reflect
   the student’s actual current performance — not an approximation — to anchor meaningful goals.
1. M.C. v. Antelope Valley Union High School District, 858 F.3d 1189 (9th Cir. 2017): Procedural
   IDEA violations that significantly impede parental participation or deprive the child of
   educational benefit constitute a denial of FAPE. PLAAFPs that omit parent input or fail to
   explain performance in parent-accessible language implicate this standard.
1. D.B. v. Gloucester Township School District, No. 14-cv-5597 (D.N.J. 2017): PLAAFP statements
   must be specific enough to enable the IEP team to design appropriate goals and services.
   General statements (“performs below grade level”) without supporting data are insufficient.
1. Susan N. v. Wilson School District, 70 F.3d 751 (3d Cir. 1995): Failure to include current
   performance levels in an IEP may constitute a procedural violation sufficient to deny FAPE
   where the omission impeded the parent’s ability to participate meaningfully.
1. Adam J. v. Keller Independent School District, 328 F.3d 804 (5th Cir. 2003): IEP teams must
   consider all areas of a child’s disability — not just academic. Failure to address functional
   performance areas in the PLAAFP when those areas are affected by the disability violates IDEA.
1. Lessard v. Wilton-Lyndeborough Cooperative School District, 518 F.3d 18 (1st Cir. 2008):
   PLAAFPs must be based on current evaluative data. Outdated or unverified performance levels
   undermine the legal sufficiency of the IEP.
1. IDEA 2004, 34 CFR §300.320(a)(1): PLAAFP must include “a statement of the child’s present
   levels of academic achievement and functional performance, including how the child’s disability
   affects the child’s involvement and progress in the general education curriculum.”
1. IDEA 2004, 34 CFR §300.320(a)(2): Goals must be measurable and based on the present levels.
   This creates a direct legal chain: PLAAFP data → goals → services. Weak PLAAFPs break this
   chain and make the entire IEP legally vulnerable.
1. OSEP Policy Letter, 64 Fed. Reg. 12,406 (1999): The Office of Special Education Programs
   clarified that PLAAFPs must describe actual current performance — not projected or historical
   performance — and must be individualized, not copied from prior IEPs or generic templates.
1. Flour Bluff ISD v. Katherine M., 91 F.3d 689 (5th Cir. 1996): IEP must reflect the unique
   needs of the child as identified through evaluation. Boilerplate or copy-paste PLAAFPs that
   don’t reflect individualized evaluation data fail this standard.

STATE-LEVEL COMPLIANCE INDICATORS:
• Texas: 19 TAC §89.1050 requires PLAAFPs to include present levels of academic and functional
performance in all areas affected by the disability, with specific data from evaluation.
• California: 5 CCR §3040 and numerous CDE complaint decisions require measurable baseline data
in PLAAFPs; generic statements have been cited as procedural FAPE violations.
• New York: 8 NYCRR §200.4(d)(2) requires PLAAFPs to reflect results of the most recent
individual evaluation and be written in terms understandable to the parent.
• Florida: Rule 6A-6.03028 FAC requires PLAAFPs to include how the disability affects
involvement and progress in age-appropriate activities and the general curriculum.

IRIS CENTER FOUR-ELEMENT FRAMEWORK (Vanderbilt/Peabody):
Every PLAAFP section must contain: (1) statement of the area of need, (2) current level of
performance with objective, measurable data, (3) how the disability affects involvement and
progress in the general curriculum, (4) connection to goals and/or services. The “stranger test”:
a teacher who has never met this student should be able to begin instruction tomorrow based solely
on the PLAAFP.`;

// INTERVIEW SYSTEM PROMPT
// The AI is instructed to return ONE structured question at a time as JSON.
// This drives the fill-in-blank / multi-select UI in the frontend.
// ─────────────────────────────────────────────────────────────────────────────
function buildInterviewPrompt(profile) {
const isVI  = profile.disabilities.some(d => d.includes(“Visual”) || d.includes(“Blind”));
const isDHH = profile.disabilities.some(d => d.includes(“Hearing”) || d.includes(“Deaf”));
const isTr  = [“8th Grade”,“9th Grade”,“10th Grade”,“11th Grade”,“12th Grade”].includes(profile.grade);

return `You are an expert special education IEP data collector conducting a structured intake interview. Your job is to gather the specific information needed to write legally compliant PLAAFP statements and impact statements under IDEA 2004.

LEGAL FRAMEWORK YOU ENFORCE:
${CASE_LAW}

STUDENT: ${profile.firstName} ${profile.lastName} | ${profile.grade} | Disabilities: ${profile.disabilities.join(”; “)}
AREAS OF NEED TO COVER: ${profile.areas.join(”, “)}

YOUR STRICT RULES:

1. Ask about ONE thing at a time — never combine multiple questions.
1. Always return a single JSON object describing the next question. No prose outside the JSON.
1. Choose the question TYPE that best fits what you need:
- “fill_blank”: for numeric/specific data (scores, rates, frequencies). Include a “template” string with ___ where the answer goes, and a “unit” hint like “words per minute” or “out of 10 trials”.
- “multiselect”: for choosing from known options. Include an “options” array.
- “scale”: for rating something 1–5. Include “low_label” and “high_label”.
- “short_text”: for observations or descriptions that can’t be structured. Keep the “prompt” under 12 words.
1. Each question must map to a specific “area” from the areas of need list AND a “dataType” from: [“baseline_score”,“strengths”,“classroom_impact”,“supports_in_place”,“parent_input”,“assessment_name”,“frequency_data”,“ecca_vi”,“ecca_dhh”,“transition_assessment”].
1. Cycle through all areas systematically. Track which areas and dataTypes you have already covered in the conversation history and move forward — never repeat a question already answered.
1. When all required data has been collected across all areas, return: {“done”: true, “message”: “I have all the data needed. Tap Generate to create your compliant PLAAFP sections.”}
1. If the teacher’s answer is vague (e.g. “struggles” or “below average”), your NEXT question must be a follow-up that asks for the specific numeric data — cite why: per Endrew F. (2017) and IRIS Center standards, vague descriptors are not legally sufficient.
   ${isVI  ? ‘8. For ECC/VI areas: you must collect FVA completion status, LMA findings, and primary learning medium.’ : ‘’}
   ${isDHH ? ‘8. For DHH areas: you must collect audiogram type/degree, communication modality, and amplification device type.’ : ‘’}
   ${isTr  ? ‘8. For transition areas: you must collect age-appropriate transition assessment name and student-stated preferences/interests.’ : ‘’}

QUESTION JSON FORMAT:
{
“area”: “area name from the list”,
“dataType”: “one of the dataType values above”,
“type”: “fill_blank | multiselect | scale | short_text”,
“prompt”: “The question in 12 words or fewer”,
“template”: “Jordan reads ___ words per minute”,   // fill_blank only
“unit”: “words per minute”,                        // fill_blank only
“options”: [“Option A”, “Option B”],               // multiselect only
“low_label”: “Never”,                              // scale only
“high_label”: “Always”,                            // scale only
“compliance_note”: “One sentence explaining why this data point is legally required”,
“area_progress”: “3 of 6 areas complete”
}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// GENERATION PROMPT — produces the final PLAAFP + Impact Statement JSON
// ─────────────────────────────────────────────────────────────────────────────
function buildGenerationPrompt(profile, collectedData) {
// Format the collected data as a readable summary for the AI
const dataSummary = Object.entries(collectedData).map(([area, responses]) => {
const lines = responses.map(r => `  • ${r.dataType}: ${r.answer}`).join(”\n”);
return `${area}:\n${lines}`;
}).join(”\n\n”);

const areaKeys = profile.areas.map(a => a.replace(/[^a-zA-Z0-9]/g, “_”));
const schema = {};
profile.areas.forEach((area, i) => {
schema[areaKeys[i]] = `[WRITE: 2-3 paragraphs for ${area}. Structure: (1) Strengths paragraph — what the student CAN do. (2) Present level paragraph — specific data with assessment name and date, per IRIS Center "stranger test" and Endrew F. standard; cite relevant case law if data supports it. (3) Curriculum impact paragraph — how this deficit specifically affects involvement and progress in general education per IDEA §300.320(a)(1) and Adam J. v. Keller ISD. Parent-friendly language; spell out all acronyms.]`;
});

return `Generate IDEA 2004-compliant PLAAFP sections and an impact statement. No goals.

LEGAL AUTHORITY: ${CASE_LAW}

STUDENT: ${profile.firstName} ${profile.lastName} | ${profile.grade} | ${profile.disabilities.join(”; “)}
AREAS: ${profile.areas.join(”, “)}

COLLECTED DATA:
${dataSummary}

COMPLIANCE REQUIREMENTS FOR OUTPUT:

1. Every PLAAFP section must cite the specific assessment name and score/date collected in the interview — not generic placeholders. Per Lessard v. Wilton-Lyndeborough (1st Cir. 2008), PLAAFPs must be based on current evaluative data.
1. Every section must include student strengths. Per Adam J. v. Keller ISD (5th Cir. 2003), all areas affected by the disability must be addressed.
1. The impact statement must name the specific IDEA §300.8 disability categories and connect each to curriculum barriers.
1. Per Endrew F. (2017): language must convey that programming is “reasonably calculated to enable ${profile.firstName} to make progress appropriate in light of their circumstances.”
1. Per OSEP Policy Letter (1999): no boilerplate — every sentence must reflect ${profile.firstName}’s individual data.
1. Add a complianceFlags array noting any areas where data was insufficient.
1. Write at an 8th-grade reading level so parents can understand. No unexplained acronyms.

Return ONLY valid JSON — no markdown fences, no text outside the object:
{
“plaafpSections”: ${JSON.stringify(schema, null, 2)},
“impactStatement”: “Two paragraphs. P1: how ${profile.firstName}’s specific disabilities (cite IDEA §300.8 names) adversely affect involvement and progress in the general education curriculum — reference specific data from each area. P2: why specially designed instruction is required, citing Endrew F. standard and at least one other relevant case or regulation.”,
“complianceFlags”: [],
“legalBasis”: {
“primaryAuthority”: “IDEA 2004, 34 CFR §300.320(a)(1)-(2)”,
“caselaw”: “Endrew F. v. Douglas County (2017); Rowley (1982); Deal v. Hamilton County (6th Cir. 2004); M.C. v. Antelope Valley (9th Cir. 2017)”,
“practiceFramework”: “IRIS Center 4-Element PLAAFP Framework; NTACT:C Indicator 13”,
“osepGuidance”: “OSEP Policy Letter, 64 Fed. Reg. 12,406 (1999) — PLAAFPs must reflect actual current individual performance”
},
“apiResponse”: {
“status”: “success”, “version”: “4.0”,
“generated_at”: “${new Date().toISOString()}”,
“disabilities”: ${JSON.stringify(profile.disabilities)},
“areas_of_need”: ${JSON.stringify(profile.areas)},
“compliance_flags”: [],
“sections”: { “plaafp_by_area”: {}, “impact_statement”: “”, “legal_basis”: {} }
}
}`;
}

async function callAPI(body) {
const res = await fetch(API_URL, {
method:“POST”,
headers:{ “Content-Type”:“application/json” },
body: JSON.stringify({ model:“claude-sonnet-4-20250514”, max_tokens:800, …body }),
});
if (!res.ok) throw new Error(`Server ${res.status}`);
return res.json();
}

function extractText(data) {
return data.content?.map(b => b.text || “”).join(””) || “”;
}

// ── Parse a JSON question from AI response ───────────────────────────────
function parseQuestion(text) {
try {
const clean = text.replace(/`json|`/g, “”).trim();
// Find the JSON object in the response
const start = clean.indexOf(”{”);
const end   = clean.lastIndexOf(”}”);
if (start === -1 || end === -1) return null;
return JSON.parse(clean.slice(start, end + 1));
} catch { return null; }
}

async function startInterview() {

}
setError(””); setLoading(true);
const estimated = estimateTotalQs(profile.areas);
setTotalQs(estimated); setAnsweredQs(0);
const initMsg = { role:“user”, content:`Begin the intake interview for ${profile.firstName} ${profile.lastName}, ${profile.grade}. Disabilities: ${profile.disabilities.join(", ")}. Areas of need: ${profile.areas.join(", ")}. Start with the first question.` };
const history = [initMsg];
try {
const data = await callAPI({ system:buildInterviewPrompt(profile), messages:history });
const text = extractText(data);
const q    = parseQuestion(text);
if (!q) throw new Error(“Could not parse question from AI response.”);
const aiMsg = { role:“assistant”, content:text };
setMsgHistory([…history, aiMsg]);
setCurrentQ(q);
setPhase(“interview”);
} catch(e) { setError(“Connection error: “ + e.message); }
finally { setLoading(false); }
}

answerText = currentAns.trim();
}
